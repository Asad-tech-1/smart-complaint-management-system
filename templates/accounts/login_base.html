<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% block title %}Smart Complaint System{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body style="background:#0f172a;">

<div class="container vh-100 d-flex justify-content-center align-items-center">

    <div class="card shadow-lg border-0" style="width:450px;border-radius:20px;">

        <div class="card-body p-5">

            <div class="text-center mb-4">

                <i class="fa-solid fa-shield-halved fa-3x text-primary mb-3"></i>

                <h2>Smart Complaint System</h2>

                {% block subtitle %}{% endblock %}

            </div>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success alert-dismissible fade show">

                        {{ message }}

                        <button class="btn-close"
                                data-bs-dismiss="alert"></button>

                    </div>
                {% endfor %}
            {% endif %}

            {% block content %}

            {% endblock %}

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

{% block scripts %}

{% endblock %}

</body>

</html>
